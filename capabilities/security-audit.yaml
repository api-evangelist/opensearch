naftiko: 1.0.0-alpha2
info:
  label: OpenSearch Security Plugin REST API — Audit
  description: 'OpenSearch Security Plugin REST API — Audit. 3 operations. Lead operation: Get audit log configuration. Self-contained
    Naftiko capability covering one Opensearch business surface.'
  tags:
  - Opensearch
  - Audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENSEARCH_API_KEY: OPENSEARCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: security-audit
    baseUri: https://{cluster-host}:9200
    description: OpenSearch Security Plugin REST API — Audit business capability. Self-contained, no shared references.
    resources:
    - name: _plugins-_security-api-audit
      path: /_plugins/_security/api/audit
      operations:
      - name: getauditconfig
        method: GET
        description: Get audit log configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: _plugins-_security-api-audit-config
      path: /_plugins/_security/api/audit/config
      operations:
      - name: replaceauditconfig
        method: PUT
        description: Replace audit log configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: patchauditconfig
        method: PATCH
        description: Patch audit log configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.OPENSEARCH_USER}}'
      password: '{{env.OPENSEARCH_PASS}}'
  exposes:
  - type: rest
    namespace: security-audit-rest
    port: 8080
    description: REST adapter for OpenSearch Security Plugin REST API — Audit. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/plugins/security/api/audit
      name: plugins-security-api-audit
      description: REST surface for _plugins-_security-api-audit.
      operations:
      - method: GET
        name: getauditconfig
        description: Get audit log configuration
        call: security-audit.getauditconfig
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/plugins/security/api/audit/config
      name: plugins-security-api-audit-config
      description: REST surface for _plugins-_security-api-audit-config.
      operations:
      - method: PUT
        name: replaceauditconfig
        description: Replace audit log configuration
        call: security-audit.replaceauditconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchauditconfig
        description: Patch audit log configuration
        call: security-audit.patchauditconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: security-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenSearch Security Plugin REST API — Audit. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-audit-log-configuration
      description: Get audit log configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: security-audit.getauditconfig
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-audit-log-configuration
      description: Replace audit log configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: security-audit.replaceauditconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: patch-audit-log-configuration
      description: Patch audit log configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: security-audit.patchauditconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
