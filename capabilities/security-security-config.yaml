naftiko: 1.0.0-alpha2
info:
  label: OpenSearch Security Plugin REST API — Security Config
  description: 'OpenSearch Security Plugin REST API — Security Config. 3 operations. Lead operation: Get security configuration.
    Self-contained Naftiko capability covering one Opensearch business surface.'
  tags:
  - Opensearch
  - Security Config
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENSEARCH_API_KEY: OPENSEARCH_API_KEY
capability:
  consumes:
  - type: http
    namespace: security-security-config
    baseUri: https://{cluster-host}:9200
    description: OpenSearch Security Plugin REST API — Security Config business capability. Self-contained, no shared references.
    resources:
    - name: _plugins-_security-api-securityconfig
      path: /_plugins/_security/api/securityconfig
      operations:
      - name: getsecurityconfig
        method: GET
        description: Get security configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchsecurityconfig
        method: PATCH
        description: Patch security configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: _plugins-_security-api-securityconfig-config
      path: /_plugins/_security/api/securityconfig/config
      operations:
      - name: replacesecurityconfig
        method: PUT
        description: Replace security configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.OPENSEARCH_USER}}'
      password: '{{env.OPENSEARCH_PASS}}'
  exposes:
  - type: rest
    namespace: security-security-config-rest
    port: 8080
    description: REST adapter for OpenSearch Security Plugin REST API — Security Config. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/plugins/security/api/securityconfig
      name: plugins-security-api-securityconfig
      description: REST surface for _plugins-_security-api-securityconfig.
      operations:
      - method: GET
        name: getsecurityconfig
        description: Get security configuration
        call: security-security-config.getsecurityconfig
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchsecurityconfig
        description: Patch security configuration
        call: security-security-config.patchsecurityconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/plugins/security/api/securityconfig/config
      name: plugins-security-api-securityconfig-config
      description: REST surface for _plugins-_security-api-securityconfig-config.
      operations:
      - method: PUT
        name: replacesecurityconfig
        description: Replace security configuration
        call: security-security-config.replacesecurityconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: security-security-config-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenSearch Security Plugin REST API — Security Config. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-security-configuration
      description: Get security configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: security-security-config.getsecurityconfig
      outputParameters:
      - type: object
        mapping: $.
    - name: patch-security-configuration
      description: Patch security configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: security-security-config.patchsecurityconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: replace-security-configuration
      description: Replace security configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: security-security-config.replacesecurityconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
